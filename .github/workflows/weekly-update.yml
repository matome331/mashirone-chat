name: Weekly Chat Collection

on:
  schedule:
    # 毎週月曜 AM9:00 JST (UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      limit:
        description: '収集する動画数の上限'
        required: false
        default: '20'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Run chat collection
        env:
          PYTHONIOENCODING: utf-8
          INPUT_LIMIT: ${{ github.event.inputs.limit || '10' }}
        run: |
          python scripts/collect_chats.py --limit "$INPUT_LIMIT" --sleep 5

      - name: Check for changes
        id: check
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          TIMESTAMP=$(date -u +"%Y-%m-%d")
          git commit -m "chore: weekly chat update ($TIMESTAMP)"
          git push
